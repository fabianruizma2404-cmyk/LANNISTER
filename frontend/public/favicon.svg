<svg width="32" height="32" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="80" height="80" rx="12" fill="#050F1C"/>

  <!-- Globo — círculo exterior -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="#1DFFA3" stroke-width="1.2" opacity="0.25"/>

  <!-- Globo — elipse ecuador -->
  <ellipse cx="40" cy="40" rx="28" ry="11" fill="none" stroke="#1DFFA3" stroke-width="0.9" opacity="0.2"/>

  <!-- Globo — líneas de referencia -->
  <line x1="12" y1="40" x2="68" y2="40" stroke="#1DFFA3" stroke-width="0.8" opacity="0.2"/>
  <line x1="40" y1="12" x2="40" y2="68" stroke="#1DFFA3" stroke-width="0.8" opacity="0.2"/>

  <!-- Cohete / flecha ascendente — sombra -->
  <polygon points="40,14 52,34 40,28 28,34" fill="#1DFFA3" opacity="0.95"/>
  <!-- Cara iluminada del cohete -->
  <polygon points="40,14 52,34 40,28" fill="#0AD688"/>

  <!-- Cuerpo del cohete -->
  <rect x="34" y="28" width="12" height="18" rx="1.5" fill="#1DFFA3" opacity="0.9"/>

  <!-- Tobera -->
  <rect x="37" y="46" width="6" height="8" rx="1" fill="#1DFFA3" opacity="0.6"/>

  <!-- Llama / propulsión -->
  <circle cx="40" cy="55" r="2.8" fill="#1DFFA3"/>

  <!-- Nodos de mercados -->
  <circle cx="57" cy="31" r="2" fill="#1DFFA3" opacity="0.55"/>
  <circle cx="23" cy="31" r="2" fill="#1DFFA3" opacity="0.55"/>
  <circle cx="23" cy="49" r="2" fill="#1DFFA3" opacity="0.4"/>
  <circle cx="57" cy="49" r="2" fill="#1DFFA3" opacity="0.4"/>

  <!-- Líneas de conexión -->
  <line x1="40" y1="55" x2="57" y2="31" stroke="#1DFFA3" stroke-width="0.6" opacity="0.3"/>
  <line x1="40" y1="55" x2="23" y2="31" stroke="#1DFFA3" stroke-width="0.6" opacity="0.3"/>
</svg>
